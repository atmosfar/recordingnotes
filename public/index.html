<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recording Notes</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --border-color: #ddd;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: #fff;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        #sidebar {
            width: 300px;
            background-color: #fff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        #session-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .session-item {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .session-item:hover {
            background-color: #f0f0f0;
        }
        #content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
        }
        #note-stream {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .note {
            display: grid;
            grid-template-columns: 100px 100px 1fr;
            gap: 1rem;
            padding: 0.5rem;
            border-radius: 4px;
        }
        .note .timestamp { color: var(--secondary-color); font-family: monospace; }
        .note .user { font-weight: bold; }
        
        #input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
        }
        #note-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <header>
        <h1>Recording Notes</h1>
        <div id="session-info">No Active Session</div>
        <button id="export-btn" style="display:none;">Export CSV</button>
    </header>
    <main>
        <div id="sidebar">
            <div style="padding: 1rem; border-bottom: 1px solid var(--border-color);">
                <button id="new-session-btn" style="width: 100%;">+ New Session</button>
            </div>
            <div id="session-list">
                <!-- Sessions will appear here -->
            </div>
        </div>
        <div id="content">
            <div id="note-stream">
                <!-- Notes will appear here -->
                <div style="color: var(--secondary-color); text-align: center; margin-top: 2rem;">
                    Select a session to start taking notes.
                </div>
            </div>
            <div id="input-area" style="display:none;">
                <input type="text" id="note-input" placeholder="Type a note and press Enter...">
                <button id="send-note-btn">Send</button>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
