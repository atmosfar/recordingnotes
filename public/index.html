<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Recording Notes</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            window.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
        }
    </script>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1 class="branding">RecNotes</h1>
            <button id="close-sidebar" class="mobile-only icon-btn">✕</button>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-top-actions mobile-only">
                <button id="new-session-btn-mobile" class="action-btn">+ New</button>
                <button id="manage-sessions-btn" class="action-btn">✎ Edit</button>
            </div>
            <button id="new-session-btn" class="desktop-only">+ New Session</button>
            <div id="session-list"></div>
        </div>
    </div>

    <div id="app-body">
        <header style="position: relative;">
            <div class="header-left">
                <button id="menu-toggle">☰</button>
                <h1 id="header-session-title">No Session</h1>
            </div>
            <div id="header-right">
                <div id="live-clock">00:00:00</div>
                <button id="theme-toggle" title="Toggle Dark Mode" class="desktop-only icon-btn">
                    <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41z"/>
                    </svg>
                </button>
                <div style="position: relative;">
                    <button id="export-btn" class="desktop-only">Export</button>
                    <div id="export-menu" class="dropdown-menu">
                        <div class="menu-item" data-format="reaper">REAPER CSV</div>
                        <div class="menu-item" data-format="audition">Adobe Audition CSV</div>
                        <div class="menu-item" data-format="edl">CMX3600 EDL (Resolve/Premiere)</div>
                    </div>
                </div>
                <div id="overflow-menu-toggle" class="mobile-only">⋮</div>
            </div>

            <div id="overflow-menu">
                <div class="menu-item" id="mobile-theme-toggle">
                    <span class="icon">
                        <svg id="mobile-theme-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                        </svg>
                    </span>
                    <span class="label">Toggle Theme</span>
                </div>
                <div class="menu-item" id="mobile-export-reaper">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                    </span>
                    <span class="label">Export REAPER CSV</span>
                </div>
                <div class="menu-item" id="mobile-export-audition">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                    </span>
                    <span class="label">Export Audition CSV</span>
                </div>
                <div class="menu-item" id="mobile-export-edl">
                    <span class="icon">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                        </svg>
                    </span>
                    <span class="label">Export CMX3600 EDL</span>
                </div>
            </div>
        </header>
        <main>
            <div id="content">
                <div id="note-stream-container">
                    <div id="note-stream">
                        <div class="empty-state">Select a session to start taking notes.</div>
                    </div>
                    <div id="draft-timestamp-display"></div>
                </div>
                <div id="input-area" style="display:none;">
                    <div id="input-row">
                        <input type="text" id="note-input" placeholder="Type a note and press Enter...">
                        <div id="palette">
                            <div class="color-opt color-none selected" data-color="" title="No color"></div>
                            <div class="color-opt color-red" data-color="#ff4d4d" title="Red"></div>
                            <div class="color-opt color-green" data-color="#2ecc71" title="Green"></div>
                            <div class="color-opt color-blue" data-color="#3498db" title="Blue"></div>
                            <div class="color-opt color-yellow" data-color="#f1c40f" title="Yellow"></div>
                        </div>
                        <div id="mobile-color-toggle">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z"/>
                            </svg>
                        </div>
                        <button id="send-note-btn">Enter</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="bottom-sheet-backdrop"></div>
    
    <div id="fps-modal" class="palette-popup" style="bottom: 50%; right: 50%; transform: translate(50%, 50%); width: 280px;">
        <h3 style="margin-top: 0; font-size: 1rem;">Select EDL Framerate</h3>
        <div class="fps-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem;">
            <button class="fps-opt action-btn" data-fps="23.976" style="font-size: 0.8rem; padding: 0.5rem;">23.976</button>
            <button class="fps-opt action-btn" data-fps="24" style="font-size: 0.8rem; padding: 0.5rem;">24</button>
            <button class="fps-opt action-btn" data-fps="25" style="font-size: 0.8rem; padding: 0.5rem;">25</button>
            <button class="fps-opt action-btn" data-fps="29.97DF" style="font-size: 0.8rem; padding: 0.5rem;">29.97 DF</button>
            <button class="fps-opt action-btn" data-fps="29.97NDF" style="font-size: 0.8rem; padding: 0.5rem;">29.97 NDF</button>
            <button class="fps-opt action-btn" data-fps="30" style="font-size: 0.8rem; padding: 0.5rem;">30</button>
        </div>
        <button id="cancel-fps" class="icon-btn" style="width: 100%; border-radius: 8px; background: #eee; color: #333; font-size: 0.9rem;">Cancel</button>
    </div>

    <div id="color-picker-popup" class="palette-popup">
        <div class="sheet-palette">
            <div class="sheet-color-opt color-none" data-color="" title="No color"></div>
            <div class="sheet-color-opt color-red" data-color="#ff4d4d" title="Red"></div>
            <div class="sheet-color-opt color-green" data-color="#2ecc71" title="Green"></div>
            <div class="sheet-color-opt color-blue" data-color="#3498db" title="Blue"></div>
            <div class="sheet-color-opt color-yellow" data-color="#f1c40f" title="Yellow"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
