<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recording Notes</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary-color: #007bff;
            --card-bg: #fff;
            --border-color: #ddd;
        }
        .dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary-color: #3791ff;
            --card-bg: #1e1e1e;
            --border-color: #333;
        }
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: var(--bg-color); color: var(--text-color); }
        .login-box { background: var(--card-bg); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; border: 1px solid var(--border-color); }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: var(--primary-color); }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); }
        button { width: 100%; padding: 0.75rem; background: var(--primary-color); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { filter: brightness(1.1); }
        #error { color: #ff4d4d; font-size: 0.9rem; text-align: center; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>RecNotes Login</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="login-btn">Login</button>
        </form>
        <div id="error">Invalid credentials</div>
    </div>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            if (response.ok) {
                const params = new URLSearchParams(window.location.search);
                const returnTo = params.get('returnTo') || '/';
                // Preserve hash if it exists (e.g. #/session/123)
                window.location.href = returnTo + window.location.hash;
            } else {
                error.style.display = 'block';
            }
        };
    </script>
</body>
</html>
